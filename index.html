<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Whence — 見其所由，知其所至</title>
  <meta name="theme-color" content="#0b1020">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="whence">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要內容</a>

  <header>
    <div class="brand">
      <img class="brand-mark" src="./icon-192.png" width="40" height="40" alt="">
      <div>
        <h1>Whence</h1>
        <span class="tagline">見其所由，知其所至</span>
      </div>
    </div>
    <div class="header-actions">
      <button type="button" id="btn-undo" class="icon-btn" aria-label="撤回最後建立的一筆" title="撤回最後建立的一筆">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M9 7 4 12l5 5M5 12h8a6 6 0 1 1-5.2 9"/></svg>
      </button>
      <button type="button" id="btn-refresh" class="icon-btn" aria-label="重新整理清單" title="重新整理清單">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.34 5.66M20 4v7h-7"/></svg>
      </button>
      <button type="button" id="btn-settings" class="icon-btn" aria-label="開啟設定" title="設定">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 7h10M18 7h2M14 5v4M4 17h2M10 17h10M8 15v4"/></svg>
      </button>
    </div>
  </header>

  <main id="main-content">
    <section class="card capture-card" id="input-card" aria-labelledby="capture-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">CAPTURE</p>
          <h2 id="capture-title">快速記錄</h2>
        </div>
        <span class="section-hint">先記下，再整理</span>
      </div>

      <div class="type-row" aria-label="記錄種類">
        <button type="button" class="type-btn active" data-kind="note" aria-pressed="true">記事</button>
        <button type="button" class="type-btn" data-kind="task" aria-pressed="false">待辦</button>
        <button type="button" class="type-btn" data-kind="idea" aria-pressed="false">靈感</button>
      </div>

      <label class="field-label" for="content">一句話</label>
      <textarea id="content" rows="2" placeholder="現在想留下什麼？"></textarea>

      <div class="space-quick" aria-label="快速選擇 Space">
        <button type="button" class="space-btn" data-space="工作" aria-pressed="false">🏢 工作</button>
        <button type="button" class="space-btn" data-space="生活" aria-pressed="false">🏠 生活</button>
        <button type="button" class="space-btn" data-space="學習" aria-pressed="false">📚 學習</button>
        <button type="button" class="space-btn" data-space="專案" aria-pressed="false">🛠 專案</button>
        <button type="button" class="space-btn" data-space="創作" aria-pressed="false">🎨 創作</button>
      </div>

      <details id="advanced-options" class="advanced-options">
        <summary>更多選項 <span>Space、標籤、照片、日期</span></summary>
        <div class="advanced-body">
      <label class="field-label" for="space">Space <span>選填</span></label>
      <input id="space" type="text" list="space-suggestions" placeholder="例如：工作、生活、閱讀" autocomplete="off">
      <datalist id="space-suggestions"></datalist>

      <label class="field-label" for="tags">標籤 <span>選填，以逗號分隔</span></label>
      <input id="tags" type="text" placeholder="例如：維修、原廠、追蹤" autocomplete="off">

      <div class="photo-field">
        <input id="photo-input" class="sr-only" type="file" accept="image/*">
        <label class="photo-picker" for="photo-input">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 7h3l1.5-2h7L17 7h3v12H4Z"/><circle cx="12" cy="13" r="3.5"/></svg>
          拍照或選取照片
        </label>
        <span class="photo-help">每筆 1 張，儲存前自動壓縮</span>
      </div>
      <div id="photo-preview" class="photo-preview" hidden>
        <img id="photo-preview-image" alt="已選取照片預覽">
        <div>
          <strong id="photo-preview-name">已選取照片</strong>
          <span id="photo-preview-size"></span>
        </div>
        <button type="button" id="btn-remove-photo" class="del-btn" aria-label="移除已選取照片">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>

      <div class="todo-row" id="todo-options" hidden>
        <button type="button" id="btn-important" class="flag-btn" aria-pressed="false"><span aria-hidden="true">★</span> 重要</button>
        <button type="button" id="btn-urgent" class="flag-btn" aria-pressed="false"><span aria-hidden="true">◆</span> 緊急</button>
        <div class="due-field">
          <label class="field-label" for="due-date">到期日 <span>選填</span></label>
          <input id="due-date" type="date">
        </div>
        <div class="due-field">
          <label class="field-label" for="due-time">時間 <span>留空＝全天</span></label>
          <input id="due-time" type="time">
        </div>
      </div>
        </div>
      </details>

      <button type="button" id="btn-save" class="save-btn">儲存</button>
    </section>

    <nav class="view-nav" aria-label="首頁檢視">
      <button type="button" class="view-btn active" data-view="today" aria-pressed="true">今日</button>
      <button type="button" class="view-btn" data-view="task" aria-pressed="false">待辦</button>
      <button type="button" class="view-btn" data-view="idea" aria-pressed="false">靈感</button>
      <button type="button" class="view-btn" data-view="note" aria-pressed="false">記事</button>
      <button type="button" class="view-btn" data-view="machine" aria-pressed="false">機況</button>
    </nav>

    <section class="filter-bar" aria-labelledby="records-title">
      <div class="section-heading compact">
        <div>
          <p class="eyebrow">RECORDS</p>
          <h2 id="records-title">今日</h2>
        </div>
        <button type="button" id="btn-batch" class="batch-toggle" aria-pressed="false">批次管理</button>
      </div>

      <label class="sr-only" for="search">搜尋內容或標籤</label>
      <input id="search" type="search" placeholder="搜尋內容或標籤…">
      <div class="filter-row">
        <label class="sr-only" for="filter-space">篩選 Space</label>
        <select id="filter-space"><option value="">全部 Space</option></select>
        <label class="sr-only" for="filter-status">篩選狀態</label>
        <select id="filter-status">
          <option value="">全部狀態</option>
          <option value="open">待處理</option>
          <option value="doing">進行中</option>
          <option value="waiting">等待中</option>
          <option value="done">完成</option>
          <option value="cancelled">取消</option>
        </select>
      </div>
      <div id="tag-chips" class="tag-chips"></div>
    </section>

    <section id="list" aria-busy="false"></section>
  </main>

  <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
    <div class="modal-body card">
      <div class="modal-heading">
        <div>
          <p class="eyebrow">CONNECTION</p>
          <h2 id="settings-title">連線設定</h2>
        </div>
        <button type="button" id="btn-close-settings" class="icon-btn quiet" aria-label="關閉設定">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <p class="modal-copy">SECRET 只用來連接你的 GAS，記事資料仍以 Google Sheets 為準。</p>
      <label class="field-label" for="secret-input">API Secret</label>
      <div class="secret-row">
        <input id="secret-input" type="password" placeholder="貼上 SECRET" autocomplete="off">
        <button type="button" id="btn-toggle-secret" class="secondary-btn" aria-pressed="false">顯示</button>
      </div>
      <button type="button" id="btn-save-secret" class="save-btn">儲存並測試連線</button>
      <p class="hint" id="settings-hint" role="status" aria-live="polite"></p>
    </div>
  </div>

  <div id="photo-modal" class="modal photo-modal" role="dialog" aria-modal="true" aria-labelledby="photo-modal-title" hidden>
    <div class="modal-body card">
      <div class="modal-heading">
        <div>
          <p class="eyebrow">ATTACHMENT</p>
          <h2 id="photo-modal-title">記事照片</h2>
        </div>
        <button type="button" id="btn-close-photo" class="icon-btn quiet" aria-label="關閉照片">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <p id="photo-loading" class="modal-copy">照片載入中…</p>
      <img id="photo-full-image" class="photo-full-image" alt="記事附件照片" hidden>
    </div>
  </div>

  <div id="batch-bar" role="toolbar" aria-label="批次操作" hidden>
    <span id="batch-count">已選 0 筆</span>
    <select id="batch-status" aria-label="要套用的狀態">
      <option value="open">待處理</option>
      <option value="doing">進行中</option>
      <option value="waiting">等待中</option>
      <option value="done">完成</option>
      <option value="cancelled">取消</option>
    </select>
    <button type="button" id="btn-batch-apply">套用狀態</button>
    <button type="button" id="btn-batch-delete">刪除</button>
    <button type="button" id="btn-batch-exit" aria-label="離開批次模式">✕</button>
  </div>

  <div id="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

  <script src="./app.js"></script>
</body>
</html>
